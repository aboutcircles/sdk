<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circles Mini App Browser Example</title>
  </head>
  <body>
    <main class="card">
      <h1>Circles Mini App Demo</h1>
      <p class="subtitle">TypeScript + Vite using <code>@aboutcircles/sdk</code> + miniapp host signer</p>

      <section>
        <h2>Environment</h2>
        <p id="mode" class="pill">Checking host mode…</p>
      </section>

      <section>
        <h2>SDK / Runner Status</h2>
        <div class="status disconnected" id="walletStatus">Initializing…</div>
        <label for="queryAddress">Address to query (optional in miniapp mode)</label>
        <input id="queryAddress" type="text" placeholder="0x..." />
        <button id="refreshBtn">Refresh Circles Data</button>
      </section>

      <section>
        <h2>SDK Read Demo</h2>
        <pre id="readResult" class="result">No query yet.</pre>
      </section>

      <section>
        <h2>SDK Write Demo (Trust)</h2>
        <label for="trustTarget">Avatar to trust</label>
        <input id="trustTarget" type="text" placeholder="0x..." />
        <button id="trustBtn" disabled>Call avatar.trust.add(...)</button>
      </section>

      <section>
        <h2>Miniapp Signer Demo</h2>
        <label for="messageInput">Message</label>
        <textarea id="messageInput">Hello from mini app browser example</textarea>

        <label for="signatureType">Signature Type</label>
        <select id="signatureType">
          <option value="erc1271" selected>erc1271</option>
          <option value="raw">raw</option>
        </select>

        <button id="signBtn" disabled>Request Signature</button>
      </section>

      <section>
        <h2>Result</h2>
        <pre id="result" class="result">No action yet.</pre>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
